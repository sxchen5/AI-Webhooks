server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: scan-platform-backend
  datasource:
    url: jdbc:mysql://localhost:3306/scan_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# JWT 密钥（生产环境请通过环境变量覆盖）
scan:
  jwt:
    secret: ${SCAN_JWT_SECRET:scan-platform-dev-secret-key-change-in-production-min-32-chars}
    expire-hours: 24
