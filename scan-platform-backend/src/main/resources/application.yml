server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    # 与 logback 中 springProperty spring.application.name 一致 → scan-platform-backend.log
    name: scan-platform-backend
  # StreamingResponseBody（Git 问答 SSE）走异步派发，默认约 30s 会 AsyncRequestTimeoutException
  mvc:
    async:
      request-timeout: ${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:2h}
  datasource:
    url: jdbc:mysql://localhost:3306/scan_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# JWT 密钥（生产环境请通过环境变量覆盖）
scan:
  jwt:
    secret: ${SCAN_JWT_SECRET:scan-platform-dev-secret-key-change-in-production-min-32-chars}
    expire-hours: 24
  # 主动扫描：未配置 local_clone_path 时，克隆到此目录下（需进程可写）
  active-scan:
    work-base-dir: ${SCAN_ACTIVE_WORK_DIR:./active-scan-work}
  # 执行 agent_command 时使用的 Shell（Windows 默认 cmd，Linux/macOS 默认 bash）
  # 若在 Windows 上要跑 .sh 或 bash 语法，可填 Git Bash 绝对路径，例如：
  # scan.shell.executable: "C:\\Program Files\\Git\\bin\\bash.exe"
  shell:
    executable: ${SCAN_SHELL_EXECUTABLE:}
